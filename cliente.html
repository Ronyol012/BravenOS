<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estado de tu proyecto — Braven Studio</title>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// React globals via UMD

// ── SUPABASE ──────────────────────────────────────────────────────────────────
const SB_URL = "https://qkguauyaetqwxvomxjbh.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrZ3VhdXlhZXRxd3h2b214amJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjYyNTksImV4cCI6MjA5MDU0MjI1OX0.g95bhHZu_Tby3TDAgbs1EQVncnFAdJ7kqPDco_Rj424";
const SB_H = { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" };

async function fetchProject(id) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/projects?id=eq.${id}&select=*`, { headers: SB_H });
    const data = await r.json();
    return data?.[0] || null;
  } catch { return null; }
}

async function fetchClient(id) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/clients?id=eq.${id}&select=*`, { headers: SB_H });
    const data = await r.json();
    return data?.[0] || null;
  } catch { return null; }
}

async function fetchChecklist(projectId) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/checklists?project_id=eq.${projectId}&select=*`, { headers: SB_H });
    const data = await r.json();
    return data?.[0]?.checks || {};
  } catch { return {}; }
}

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const PLANS = {
  "BRV-01": { label: "Plan Lanzamiento", days: "3 días hábiles" },
  "BRV-02": { label: "Plan Portafolio", days: "4 días hábiles" },
  "BRV-03": { label: "Plan Crecimiento", days: "7–10 días hábiles" },
  "BRV-04": { label: "Plan Ecommerce", days: "10–14 días hábiles" },
};

const PIPELINE = ["Brief", "Diseño", "Aprobación", "Desarrollo", "Revisión", "Entregado"];

const CHECKLIST_ITEMS = {
  "Antes de mostrar al cliente": [
    "Wireframe: estructura lógica y todas las secciones definidas",
    "Visual: colores aplicados, tipografía clara, logo en su lugar",
    "Imágenes placeholder o reales en posición correcta",
    "Botones visibles con estados definidos",
    "Mobile mockup incluido",
    "Espacios negativos equilibrados",
  ],
  "Después de aprobación del cliente": [
    "Frame SPECS documentado",
    "Elementos organizados en capas de Figma",
    "Notas sobre animaciones documentadas",
    "Link de Figma compartido",
    "Documentación lista para desarrollo",
    "Timeline definido",
  ],
  "Deploy y entrega final": [
    "Código pusheado a GitHub",
    "Deploy en Netlify verificado",
    "Dominio conectado y SSL activo",
    "Video tutorial grabado",
    "Guía de edición entregada",
    "Pago final completado",
    "Plan de mantenimiento ofrecido",
  ],
};

const STATUS_CONFIG = {
  Brief:      { color: "#3B82F6", bg: "#EFF6FF", icon: "📋", desc: "Recopilando información y materiales del proyecto" },
  Diseño:     { color: "#7C3AED", bg: "#F5F3FF", icon: "✏️", desc: "Creando wireframes y diseño visual en Figma" },
  Aprobación: { color: "#D97706", bg: "#FFFBEB", icon: "👁", desc: "Esperando tu revisión y aprobación del diseño" },
  Desarrollo: { color: "#2E75B6", bg: "#EFF6FF", icon: "⚙️", desc: "Codificando el sitio web con el diseño aprobado" },
  Revisión:   { color: "#0891B2", bg: "#ECFEFF", icon: "🔍", desc: "Revisión final antes de publicar" },
  Entregado:  { color: "#059669", bg: "#F0FDF4", icon: "🎉", desc: "Proyecto completado y publicado exitosamente" },
  Pausado:    { color: "#6B7280", bg: "#F9FAFB", icon: "⏸", desc: "Proyecto en pausa, esperando respuesta" },
  Cancelado:  { color: "#DC2626", bg: "#FEF2F2", icon: "✕", desc: "Proyecto cancelado" },
};

const T = {
  bg: "#F4F7FC", surface: "#FFFFFF",
  border: "#DDE6F2", borderStrong: "#C4D4E8",
  primary: "#2E75B6", primaryDark: "#1D5A9A",
  primaryLight: "#EBF3FB", primaryMid: "#D0E4F5",
  text: "#0F1F35", textSub: "#44546A", muted: "#7E93AC",
  success: "#059669", successBg: "#F0FDF4",
  shadow: "0 1px 3px rgba(46,117,182,0.08), 0 1px 2px rgba(0,0,0,0.04)",
  shadowMd: "0 4px 16px rgba(46,117,182,0.12)",
  shadowLg: "0 20px 40px rgba(46,117,182,0.14)",
};

// ── COMPONENTS ────────────────────────────────────────────────────────────────
function Card({ children, style = {} }) {
  return <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 20, padding: "24px 28px", boxShadow: T.shadow, ...style }}>{children}</div>;
}

function Input({ ...props }) {
  const [focus, setFocus] = useState(false);
  return <input {...props} onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
    style={{ background: focus ? "#fff" : T.bg, border: `2px solid ${focus ? T.primary : T.border}`, color: T.text, padding: "12px 16px", borderRadius: 12, fontFamily: "inherit", fontSize: 15, outline: "none", width: "100%", transition: "all 0.15s", boxShadow: focus ? `0 0 0 4px ${T.primary}12` : "none", letterSpacing: "0.05em", ...props.style }} />;
}

function Spinner() {
  return <div style={{ width: 36, height: 36, borderRadius: "50%", border: `3px solid ${T.primaryMid}`, borderTopColor: T.primary, animation: "spin 0.8s linear infinite" }} />;
}

// ── PIPELINE TRACKER ─────────────────────────────────────────────────────────
function PipelineTracker({ status }) {
  const activeIdx = PIPELINE.indexOf(status);
  const isSpecial = !PIPELINE.includes(status);

  if (isSpecial) {
    const sc = STATUS_CONFIG[status] || STATUS_CONFIG["Pausado"];
    return (
      <div style={{ textAlign: "center", padding: "20px 0" }}>
        <div style={{ display: "inline-flex", alignItems: "center", gap: 10, background: sc.bg, border: `2px solid ${sc.color}30`, borderRadius: 14, padding: "12px 24px" }}>
          <span style={{ fontSize: 20 }}>{sc.icon}</span>
          <span style={{ fontWeight: 700, fontSize: 16, color: sc.color }}>{status}</span>
        </div>
        <div style={{ marginTop: 10, fontSize: 14, color: T.muted }}>{sc.desc}</div>
      </div>
    );
  }

  return (
    <div style={{ overflowX: "auto", paddingBottom: 8 }}>
      <div style={{ display: "flex", alignItems: "center", minWidth: 500, gap: 0 }}>
        {PIPELINE.map((step, i) => {
          const isDone = i < activeIdx;
          const isActive = i === activeIdx;
          const isFuture = i > activeIdx;
          const sc = STATUS_CONFIG[step];
          return (
            <div key={step} style={{ display: "flex", alignItems: "center", flex: i < PIPELINE.length - 1 ? 1 : 0 }}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, position: "relative" }}>
                {/* Circle */}
                <div style={{
                  width: isActive ? 44 : 36,
                  height: isActive ? 44 : 36,
                  borderRadius: "50%",
                  background: isDone ? T.success : isActive ? sc.color : T.bg,
                  border: `2.5px solid ${isDone ? T.success : isActive ? sc.color : T.border}`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: isActive ? 18 : 14,
                  transition: "all 0.3s",
                  boxShadow: isActive ? `0 4px 16px ${sc.color}40` : "none",
                  zIndex: 1,
                }}>
                  {isDone ? <span style={{ fontSize: 14, color: "#fff", fontWeight: 800 }}>✓</span> :
                    isActive ? <span>{sc.icon}</span> :
                      <span style={{ fontSize: 12, color: T.muted, fontWeight: 700 }}>{i + 1}</span>}
                </div>
                {/* Label */}
                <span style={{
                  fontSize: 11, fontWeight: isActive ? 700 : 500,
                  color: isDone ? T.success : isActive ? sc.color : T.muted,
                  whiteSpace: "nowrap", textAlign: "center",
                }}>{step}</span>
              </div>
              {/* Connector line */}
              {i < PIPELINE.length - 1 && (
                <div style={{ flex: 1, height: 3, background: i < activeIdx ? T.success : T.border, margin: "0 4px", marginBottom: 20, borderRadius: 99, transition: "background 0.3s" }} />
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── CHECKLIST VIEW (public, clean) ────────────────────────────────────────────
function ChecklistView({ checks }) {
  const allKeys = Object.entries(CHECKLIST_ITEMS).flatMap(([s, items]) => items.map((_, i) => `${s}__${i}`));
  const done = allKeys.filter(k => checks[k]).length;
  const pct = Math.round((done / allKeys.length) * 100);

  return (
    <div>
      {/* Progress summary */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <span style={{ fontSize: 13, color: T.textSub, fontWeight: 600 }}>Avance general</span>
        <span style={{ fontSize: 13, fontWeight: 700, color: pct === 100 ? T.success : T.primary }}>{done}/{allKeys.length} completadas</span>
      </div>
      <div style={{ background: T.border, borderRadius: 99, height: 8, overflow: "hidden", marginBottom: 20 }}>
        <div style={{ background: pct === 100 ? T.success : T.primary, width: `${pct}%`, height: "100%", borderRadius: 99, transition: "width 0.8s cubic-bezier(.4,0,.2,1)" }} />
      </div>

      {Object.entries(CHECKLIST_ITEMS).map(([section, items]) => {
        const secKeys = items.map((_, i) => `${section}__${i}`);
        const secDone = secKeys.filter(k => checks[k]).length;
        const allDone = secDone === items.length;

        return (
          <div key={section} style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: T.text }}>{section}</span>
              <span style={{ fontSize: 11, fontWeight: 700, color: allDone ? T.success : T.muted, background: allDone ? T.successBg : T.bg, padding: "2px 9px", borderRadius: 99, border: `1px solid ${allDone ? "#A7F3D0" : T.border}` }}>{secDone}/{items.length}{allDone ? " ✓" : ""}</span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
              {items.map((item, idx) => {
                const key = `${section}__${idx}`;
                const checked = !!checks[key];
                return (
                  <div key={idx} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: 9, background: checked ? T.successBg : T.bg, border: `1px solid ${checked ? "#A7F3D0" : T.border}` }}>
                    <div style={{ width: 18, height: 18, borderRadius: 5, border: `2px solid ${checked ? T.success : T.border}`, background: checked ? T.success : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      {checked && <span style={{ fontSize: 10, color: "#fff", fontWeight: 800 }}>✓</span>}
                    </div>
                    <span style={{ fontSize: 12, color: checked ? T.success : T.textSub, textDecoration: checked ? "line-through" : "none" }}>{item}</span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
function BravenClientView() {
  const [code, setCode] = useState("");
  const [inputCode, setInputCode] = useState("");
  const [project, setProject] = useState(null);
  const [client, setClient] = useState(null);
  const [checks, setChecks] = useState({});
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [showChecklist, setShowChecklist] = useState(false);
  const [lastUpdated, setLastUpdated] = useState(null);

  async function load(id) {
    setLoading(true); setError(""); setProject(null); setClient(null);
    const proj = await fetchProject(id.trim());
    if (!proj) { setError("Código no encontrado. Verifica con tu diseñador."); setLoading(false); return; }
    const cl = proj.clientId ? await fetchClient(proj.clientId) : null;
    const ch = await fetchChecklist(id.trim());
    setProject(proj); setClient(cl); setChecks(ch);
    setCode(id.trim()); setLastUpdated(new Date()); setLoading(false);
  }

  // Auto-refresh every 30s
  useEffect(() => {
    if (!code) return;
    const interval = setInterval(async () => {
      const proj = await fetchProject(code);
      const ch = await fetchChecklist(code);
      if (proj) { setProject(proj); setLastUpdated(new Date()); }
      if (ch) setChecks(ch);
    }, 30000);
    return () => clearInterval(interval);
  }, [code]);

  const sc = project ? (STATUS_CONFIG[project.status] || STATUS_CONFIG["Pausado"]) : null;
  const allCheckKeys = Object.entries(CHECKLIST_ITEMS).flatMap(([s, items]) => items.map((_, i) => `${s}__${i}`));
  const doneTasks = allCheckKeys.filter(k => checks[k]).length;
  const totalTasks = allCheckKeys.length;

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #F4F7FC; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #C4D4E8; border-radius: 10px; }
      `}</style>

      <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", background: T.bg, minHeight: "100vh", color: T.text }}>

        {/* Header */}
        <div style={{ background: T.primary, padding: "0 24px" }}>
          <div style={{ maxWidth: 720, margin: "0 auto", height: 64, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 32, height: 32, borderRadius: 9, background: "rgba(255,255,255,0.18)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <span style={{ color: "#fff", fontWeight: 900, fontSize: 12 }}>BV</span>
              </div>
              <div>
                <div style={{ fontSize: 15, fontWeight: 800, color: "#fff", letterSpacing: "-0.3px" }}>Braven Studio</div>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,0.6)", fontWeight: 500 }}>Estado de tu proyecto</div>
              </div>
            </div>
            {lastUpdated && (
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#4ADE80", display: "inline-block", animation: "pulse 2s infinite" }} />
                En vivo · actualiza cada 30s
              </div>
            )}
          </div>
        </div>

        <div style={{ maxWidth: 720, margin: "0 auto", padding: "32px 24px 60px" }}>

          {/* Search */}
          {!project && (
            <div style={{ animation: "fadeUp 0.4s ease" }}>
              <div style={{ textAlign: "center", marginBottom: 40 }}>
                <div style={{ fontSize: 36, marginBottom: 12 }}>🔍</div>
                <h1 style={{ fontSize: 26, fontWeight: 800, color: T.text, letterSpacing: "-0.6px", marginBottom: 8 }}>Consulta el estado<br/>de tu proyecto</h1>
                <p style={{ fontSize: 15, color: T.muted, lineHeight: 1.6 }}>Ingresa el código que te compartió tu diseñador<br/>para ver el avance en tiempo real.</p>
              </div>

              <Card style={{ maxWidth: 440, margin: "0 auto" }}>
                <div style={{ marginBottom: 16 }}>
                  <label style={{ display: "block", fontSize: 12, color: T.textSub, marginBottom: 8, fontWeight: 700, letterSpacing: "0.06em" }}>CÓDIGO DE PROYECTO</label>
                  <Input
                    value={inputCode}
                    onChange={e => setInputCode(e.target.value.trim())}
                    onKeyDown={e => e.key === "Enter" && inputCode && load(inputCode)}
                    placeholder="Ej: abc1de23"
                    style={{ textAlign: "center", fontWeight: 700, fontSize: 18, letterSpacing: "0.15em" }}
                  />
                </div>
                <button
                  onClick={() => inputCode && load(inputCode)}
                  disabled={!inputCode || loading}
                  style={{ width: "100%", padding: "13px", background: inputCode && !loading ? T.primary : T.border, color: inputCode && !loading ? "#fff" : T.muted, border: "none", borderRadius: 12, fontFamily: "inherit", fontWeight: 700, fontSize: 15, cursor: inputCode && !loading ? "pointer" : "not-allowed", transition: "all 0.2s", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                  {loading ? <><Spinner /> Buscando...</> : "Ver mi proyecto →"}
                </button>
                {error && (
                  <div style={{ marginTop: 14, padding: "10px 14px", background: "#FEF2F2", borderRadius: 10, border: "1px solid #FECACA", fontSize: 13, color: "#DC2626", textAlign: "center" }}>
                    ⚠ {error}
                  </div>
                )}
              </Card>

              <div style={{ textAlign: "center", marginTop: 28, fontSize: 13, color: T.muted }}>
                ¿No tienes tu código? Escríbele a tu diseñador en Braven.
              </div>
            </div>
          )}

          {/* Project view */}
          {project && (
            <div style={{ animation: "fadeUp 0.4s ease" }}>

              {/* Back */}
              <button onClick={() => { setProject(null); setCode(""); setInputCode(""); }} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 13, color: T.muted, background: "none", border: "none", cursor: "pointer", marginBottom: 24, fontFamily: "inherit", fontWeight: 500 }}>
                ← Buscar otro proyecto
              </button>

              {/* Status hero */}
              <Card style={{ marginBottom: 16, background: sc.bg, border: `2px solid ${sc.color}25` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 16 }}>
                  <div>
                    <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: T.surface, border: `1px solid ${sc.color}30`, borderRadius: 99, padding: "4px 14px", marginBottom: 14 }}>
                      <span style={{ width: 7, height: 7, borderRadius: "50%", background: sc.color, display: "inline-block" }} />
                      <span style={{ fontSize: 12, fontWeight: 700, color: sc.color }}>{project.status}</span>
                    </div>
                    <h2 style={{ fontSize: 22, fontWeight: 800, color: T.text, letterSpacing: "-0.5px", marginBottom: 4 }}>
                      {client ? client.name : project.clientName || "Tu proyecto"}
                    </h2>
                    {client?.company && <div style={{ fontSize: 14, color: T.primary, fontWeight: 600, marginBottom: 6 }}>{client.company}</div>}
                    <div style={{ fontSize: 14, color: T.muted }}>{sc.desc}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 11, color: T.muted, fontWeight: 600, letterSpacing: "0.06em", marginBottom: 4 }}>PLAN</div>
                    <div style={{ fontSize: 20, fontWeight: 800, color: sc.color }}>{project.plan}</div>
                    <div style={{ fontSize: 12, color: T.muted }}>{PLANS[project.plan]?.label}</div>
                    <div style={{ fontSize: 11, color: T.muted, marginTop: 2 }}>⏱ {PLANS[project.plan]?.days}</div>
                  </div>
                </div>
              </Card>

              {/* Pipeline */}
              <Card style={{ marginBottom: 16 }}>
                <div style={{ fontWeight: 700, fontSize: 15, color: T.text, marginBottom: 20 }}>Progreso del proyecto</div>
                <PipelineTracker status={project.status} />
              </Card>

              {/* Info grid */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
                <Card style={{ padding: "16px 20px" }}>
                  <div style={{ fontSize: 11, color: T.muted, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 6 }}>INICIO DEL PROYECTO</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: T.text }}>{project.startDate || "—"}</div>
                </Card>
                <Card style={{ padding: "16px 20px" }}>
                  <div style={{ fontSize: 11, color: T.muted, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 6 }}>ENTREGA ESTIMADA</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: T.text }}>{PLANS[project.plan]?.days || "—"}</div>
                </Card>
              </div>

              {/* Tasks progress */}
              <Card style={{ marginBottom: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15, color: T.text, marginBottom: 2 }}>Tareas completadas</div>
                    <div style={{ fontSize: 13, color: T.muted }}>{doneTasks} de {totalTasks} tareas del proceso</div>
                  </div>
                  <button onClick={() => setShowChecklist(v => !v)} style={{ fontSize: 12, color: T.primary, background: T.primaryLight, border: `1px solid ${T.primaryMid}`, borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>
                    {showChecklist ? "Ocultar" : "Ver detalle"}
                  </button>
                </div>
                <div style={{ background: T.border, borderRadius: 99, height: 10, overflow: "hidden", marginBottom: 8 }}>
                  <div style={{ background: doneTasks === totalTasks ? T.success : T.primary, width: `${Math.round((doneTasks / totalTasks) * 100)}%`, height: "100%", borderRadius: 99, transition: "width 0.8s cubic-bezier(.4,0,.2,1)" }} />
                </div>
                <div style={{ fontSize: 12, color: T.muted, display: "flex", justifyContent: "space-between" }}>
                  <span style={{ fontWeight: 700, color: doneTasks === totalTasks ? T.success : T.primary }}>{Math.round((doneTasks / totalTasks) * 100)}% completado</span>
                  <span>{totalTasks - doneTasks} tareas restantes</span>
                </div>

                {showChecklist && (
                  <div style={{ marginTop: 20, paddingTop: 20, borderTop: `1px solid ${T.border}` }}>
                    <ChecklistView checks={checks} />
                  </div>
                )}
              </Card>

              {/* What's next */}
              {project.status !== "Entregado" && project.status !== "Cancelado" && (
                <Card style={{ background: T.primaryLight, border: `1px solid ${T.primaryMid}` }}>
                  <div style={{ fontWeight: 700, fontSize: 14, color: T.primary, marginBottom: 8 }}>¿Qué sigue?</div>
                  <div style={{ fontSize: 14, color: T.textSub, lineHeight: 1.6 }}>
                    {project.status === "Brief" && "Tu diseñador está revisando la información del proyecto. Asegúrate de haber enviado todos los materiales: logo, textos, referencias visuales y acceso al dominio."}
                    {project.status === "Diseño" && "El equipo está trabajando en el diseño visual de tu sitio en Figma. Recibirás el link para revisión muy pronto."}
                    {project.status === "Aprobación" && "🎯 Tu acción es requerida. Revisa el diseño en Figma y confirma si está listo para codificar, o envía tus comentarios de ajuste."}
                    {project.status === "Desarrollo" && "El sitio está siendo construido. Este proceso toma entre 1–2 horas de trabajo. Pronto tendrás una vista previa."}
                    {project.status === "Revisión" && "🎯 Tu acción es requerida. Revisa la vista previa del sitio y confirma si está listo para publicar o si necesita ajustes finales."}
                    {project.status === "Pausado" && "El proyecto está en pausa. Escríbele a tu diseñador para retomarlo."}
                  </div>
                </Card>
              )}

              {project.status === "Entregado" && (
                <Card style={{ background: T.successBg, border: "1px solid #A7F3D0", textAlign: "center", padding: "32px 28px" }}>
                  <div style={{ fontSize: 40, marginBottom: 12 }}>🎉</div>
                  <div style={{ fontWeight: 800, fontSize: 20, color: T.success, marginBottom: 8 }}>¡Proyecto entregado!</div>
                  <div style={{ fontSize: 14, color: T.textSub, lineHeight: 1.6 }}>Tu sitio web está publicado y listo para el mundo. Gracias por confiar en Braven Studio.</div>
                </Card>
              )}

              {/* Footer info */}
              <div style={{ marginTop: 32, textAlign: "center" }}>
                <div style={{ fontSize: 12, color: T.muted, marginBottom: 4 }}>¿Tienes preguntas? Escríbele directamente a tu diseñador.</div>
                <div style={{ fontSize: 11, color: T.muted, opacity: 0.6 }}>Código del proyecto: <strong>{code}</strong> · Actualizado {lastUpdated?.toLocaleTimeString("es-DO")}</div>
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{ background: T.primary, padding: "16px 24px", textAlign: "center" }}>
          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.8)", fontWeight: 600 }}>BRAVEN Studio · braven.studio · Santo Domingo, RD</div>
        </div>
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(BravenClientView));
  </script>
</body>
</html>
